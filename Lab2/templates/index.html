<!DOCTYPE html>
<html>
<head>
    <title>Juice Shop - Lab</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px; }
        .card { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        h1 { color: #ff8c00; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🍹 Premium Juice Menu 🍹</h1>
    <div class="grid">
        {% for i in range(1, 9) %}
        <div class="card">
            <img src="/display?file=juice{{i}}.jpg">
            <p>Fresh Juice #{{i}}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
